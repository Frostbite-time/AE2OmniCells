name: Build & Publish

on: [workflow_dispatch]

env:
  JAVA_VERSION: "17"
  LOADER: "forge"

  CURSEFORGE_ID: "1359517"
  MODRINTH_ID: "RYE1pYyr"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Wrapper Executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Read gradle.properties (mod_id/minecraft_version/mod_version/mod_name)
        id: props
        shell: bash
        run: |
          set -euo pipefail

          mod_id="$(grep -m1 -E '^\s*mod_id\s*=' gradle.properties | sed -E 's/^\s*mod_id\s*=\s*//; s/\r$//')"
          minecraft_version="$(grep -m1 -E '^\s*minecraft_version\s*=' gradle.properties | sed -E 's/^\s*minecraft_version\s*=\s*//; s/\r$//')"
          mod_version="$(grep -m1 -E '^\s*mod_version\s*=' gradle.properties | sed -E 's/^\s*mod_version\s*=\s*//; s/\r$//')"
          mod_name="$(grep -m1 -E '^\s*mod_name\s*=' gradle.properties | sed -E 's/^\s*mod_name\s*=\s*//; s/\r$//')"

          if [[ -z "$mod_id" || -z "$minecraft_version" || -z "$mod_version" || -z "$mod_name" ]]; then
            echo "mod_id / minecraft_version / mod_version / mod_name not found in gradle.properties" >&2
            exit 1
          fi

          jar_name="${mod_id}-${minecraft_version}-${{ env.LOADER }}-${mod_version}.jar"
          display_name="${mod_name} ${mod_version} for ${minecraft_version} ${{ env.LOADER }}"
          display_version="${mod_version}-${minecraft_version}-${{ env.LOADER }}"

          {
            echo "mod_id=$mod_id"
            echo "minecraft_version=$minecraft_version"
            echo "mod_version=$mod_version"
            echo "jar_name=$jar_name"

            echo "mod_name<<EOF"
            echo "$mod_name"
            echo "EOF"

            echo "display_name<<EOF"
            echo "$display_name"
            echo "EOF"

            echo "display_version=$display_version"
          } >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Verify jar exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah build/libs
          test -f "build/libs/${{ steps.props.outputs.jar_name }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.props.outputs.jar_name }}
          path: build/libs/${{ steps.props.outputs.jar_name }}
          if-no-files-found: error

      - name: Publish (GitHub / CurseForge / Modrinth)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # CurseForge
          curseforge-id: ${{ env.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.PUBLISH_CURSEFORGE_TOKEN }}

          # Modrinth
          modrinth-id: ${{ env.MODRINTH_ID }}
          modrinth-token: ${{ secrets.PUBLISH_MODRINTH_TOKEN }}

          # GitHub Release
          github-tag: v${{ steps.props.outputs.display_version }}
          github-token: ${{ secrets.PUBLISH_GITHUB_TOKEN }}

          name: ${{ steps.props.outputs.display_name }}
          version: ${{ steps.props.outputs.display_version }}
          version-type: release
          changelog-file: docs/CHANGELOG.md

          files: |
            build/libs/${{ steps.props.outputs.jar_name }}

          loaders: |
            ${{ env.LOADER }}

          game-versions: |
            ${{ steps.props.outputs.minecraft_version }}

          java: |
            ${{ env.JAVA_VERSION }}
