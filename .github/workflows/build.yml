name: Build

on: [workflow_dispatch]

env:
  JAVA_VERSION: "17"
  LOADER: "forge"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Wrapper Executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Read gradle.properties (mod_id/minecraft_version/mod_version)
        id: props
        shell: bash
        run: |
          set -euo pipefail

          mod_id="$(grep -m1 -E '^\s*mod_id\s*=' gradle.properties | sed -E 's/^\s*mod_id\s*=\s*//; s/\r$//')"
          minecraft_version="$(grep -m1 -E '^\s*minecraft_version\s*=' gradle.properties | sed -E 's/^\s*minecraft_version\s*=\s*//; s/\r$//')"
          mod_version="$(grep -m1 -E '^\s*mod_version\s*=' gradle.properties | sed -E 's/^\s*mod_version\s*=\s*//; s/\r$//')"

          if [[ -z "$mod_id" || -z "$minecraft_version" || -z "$mod_version" ]]; then
            echo "mod_id / minecraft_version / mod_version not found in gradle.properties" >&2
            exit 1
          fi

          jar_name="${mod_id}-${minecraft_version}-${{ env.LOADER }}-${mod_version}.jar"

          echo "mod_id=$mod_id" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$minecraft_version" >> "$GITHUB_OUTPUT"
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "jar_name=$jar_name" >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Verify jar exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah build/libs
          test -f "build/libs/${{ steps.props.outputs.jar_name }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.props.outputs.jar_name }}
          path: build/libs/${{ steps.props.outputs.jar_name }}
          if-no-files-found: error
